name: Ecosystem Validation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .
        # Submodules might need additional tools
        npm install -g turbo pnpm

    - name: Run Ecosystem Tests
      run: |
        python scripts/workspace_cli.py test
